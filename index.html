<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith & Kenneth | #BecomingTheDaniels</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Montserrat&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
--accent: #722F37;
--secondary: #2D5A27;
--bg-light: #F9F7F2;
}

body { font-family: 'Montserrat', sans-serif; background: var(--bg-light); }
h1,h2 { font-family: 'Cormorant Garamond', serif; }
.cursive { font-family: 'Great Vibes', cursive; }

.reveal { opacity:0; transform:translateY(20px); transition:.8s; }
.reveal.active { opacity:1; transform:translateY(0); }

.btn-primary {
background: var(--accent);
color:#fff;
padding:1rem;
width:100%;
}

.contact-card {
background:#fff;
padding:1.5rem;
width:240px;
border:1px solid #eee;
}
</style>
</head>

<body>

<!-- HERO -->
<header class="h-screen flex items-center justify-center text-center text-white relative">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=2000"
class="absolute w-full h-full object-cover">
<div class="absolute inset-0 bg-black/50"></div>

<div class="relative z-10">
<h1 class="text-5xl md:text-8xl">Faith & Kenneth</h1>
<p class="mt-4">June 27, 2026</p>
</div>
</header>

<!-- RSVP -->
<section class="p-10 max-w-xl mx-auto">

<h2 class="text-3xl mb-6 text-center">RSVP</h2>

<form id="form" action="https://formspree.io/f/mojpdlnn" method="POST">

<input name="name" required placeholder="Full Name" class="w-full mb-4 p-3 border">
<input name="phone" required placeholder="Phone Number" class="w-full mb-4 p-3 border">

<select name="attendance" class="w-full mb-6 p-3 border">
<option value="Accepts">Accepts</option>
<option value="Declines">Declines</option>
</select>

<button class="btn-primary">Submit RSVP</button>

</form>

<p id="msg" class="text-center mt-4"></p>

</section>

<script>

// FORM SUBMIT
const form = document.getElementById('form');
const msg = document.getElementById('msg');

form.addEventListener('submit', async (e)=>{
e.preventDefault();

const data = new FormData(form);

const res = await fetch(form.action,{
method:'POST',
body:data,
headers:{'Accept':'application/json'}
});

if(res.ok){
msg.innerHTML = "✅ RSVP Sent Successfully!";
form.reset();
}else{
msg.innerHTML = "❌ Error sending RSVP";
}
});

</script>

</body>
</html>
